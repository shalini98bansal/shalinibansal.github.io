<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(30, 64, 175, 0.12)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-major" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(30, 64, 175, 0.22)" stroke-width="0.75"/>
    </pattern>
    <linearGradient id="bg-fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f6"/>
    </linearGradient>
  </defs>

  <rect width="220" height="220" fill="url(#bg-fade)"/>
  <rect width="220" height="220" fill="url(#grid)"/>
  <rect width="220" height="220" fill="url(#grid-major)"/>

  <!-- Corner ticks (blueprint-style) -->
  <g stroke="#1e40af" stroke-width="1.25" fill="none">
    <path d="M 8 8 L 8 22 M 8 8 L 22 8"/>
    <path d="M 212 8 L 212 22 M 212 8 L 198 8"/>
    <path d="M 8 212 L 8 198 M 8 212 L 22 212"/>
    <path d="M 212 212 L 212 198 M 212 212 L 198 212"/>
  </g>

  <!-- Monogram SB -->
  <g font-family="'Inter', -apple-system, sans-serif" font-weight="600" fill="#18181b" text-anchor="middle">
    <text x="110" y="128" font-size="86" letter-spacing="-3">SB</text>
  </g>

  <!-- Technical caption -->
  <g font-family="'JetBrains Mono', monospace" fill="#6b6b72">
    <text x="20" y="180" font-size="9" letter-spacing="1.2">SHALINI BANSAL</text>
    <text x="20" y="194" font-size="8" letter-spacing="0.8" fill="#a1a1aa">REV 1.0 — PLACEHOLDER</text>
  </g>
</svg>
